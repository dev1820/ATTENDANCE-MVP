<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Attendance</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="page">
    <div class="page-header">
      <div>
        <h2 class="page-title">Attendance</h2>
        <p class="page-subtitle">Track check-ins and check-outs across assigned sites.</p>
      </div>
      <button id="logoutBtn" class="btn-secondary">Logout</button>
    </div>

    <div id="welcomeBox" class="info-banner"></div>

    <div id="statusBox" class="card section status-card"></div>
    <div class="card section">
    <h3>Identity Verification</h3>
    <p class="small-note">Face verification is required before check-in.</p>
    <div class="inline-actions">
    <button id="verifyFaceBtn" class="btn-primary">Verify Face</button>
    </div>
    <p id="faceMsg" class="message"></p>
    </div>

    <div class="card section">
      <h3>Assigned sites</h3>
      <div id="sites"></div>
    </div>

    <div id="pinBox" class="card section pin-box" style="display:none;">
      <h3 id="pinTitle">Enter Site PIN</h3>
      <input id="pinInput" type="password" inputmode="numeric" placeholder="Supervisor PIN" />
      <div class="inline-actions">
        <button id="confirmBtn" class="btn-primary">Confirm</button>
      </div>
      <p id="pinMsg" class="message error"></p>
    </div>

    <p id="toast" class="message"></p>
  </div>

  <script src="/app.js"></script>
</body>
</html>
